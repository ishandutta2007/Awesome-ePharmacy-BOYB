<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="50%" stop-color="#070a13" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Metallic/Cyber Gradient for Text -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="50%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>

    <!-- Subtle Wave Gradient -->
    <linearGradient id="wave-grad-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.1" />
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.1" />
    </linearGradient>

    <linearGradient id="wave-grad-2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.05" />
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.05" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComponentTransfer in="blur" result="boost">
        <feFuncA type="linear" slope="1.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="boost" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- CSS Keyframe Animations for Dynamic Aspect -->
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(1.05); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      @keyframes wave-motion {
        0% { transform: translateX(0px) skewY(-2deg); }
        50% { transform: translateX(-50px) skewY(1deg); }
        100% { transform: translateX(0px) skewY(-2deg); }
      }
      @keyframes wave-motion-reverse {
        0% { transform: translateX(0px) skewY(1deg); }
        50% { transform: translateX(50px) skewY(-2deg); }
        100% { transform: translateX(0px) skewY(1deg); }
      }
      @keyframes text-shine {
        0% { stop-color: #60a5fa; }
        33% { stop-color: #f43f5e; }
        66% { stop-color: #a78bfa; }
        100% { stop-color: #60a5fa; }
      }
      .anim-pulse {
        animation: pulse 6s ease-in-out infinite;
        transform-origin: center;
      }
      .anim-float {
        animation: float 4s ease-in-out infinite;
      }
      .anim-wave-1 {
        animation: wave-motion 12s ease-in-out infinite;
      }
      .anim-wave-2 {
        animation: wave-motion-reverse 15s ease-in-out infinite;
      }
      .shine-stop {
        animation: text-shine 8s linear infinite;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-grad)" />

  <!-- Animated Tech Grid/Pattern -->
  <g opacity="0.15">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#94a3b8" stroke-width="0.5" />
    </pattern>
    <rect width="1200" height="400" fill="url(#grid)" />
  </g>

  <!-- Background Glowing Orbs -->
  <circle cx="200" cy="150" r="120" fill="#3b82f6" opacity="0.15" filter="url(#glow-strong)" class="anim-pulse" />
  <circle cx="1000" cy="250" r="150" fill="#8b5cf6" opacity="0.12" filter="url(#glow-strong)" class="anim-pulse" style="animation-delay: -3s;" />
  <circle cx="600" cy="200" r="80" fill="#ec4899" opacity="0.1" filter="url(#glow-strong)" class="anim-pulse" style="animation-delay: -1.5s;" />

  <!-- Animated Waves -->
  <path class="anim-wave-1" d="M0,150 C300,100 600,250 900,180 C1050,140 1150,220 1200,250 L1200,400 L0,400 Z" fill="url(#wave-grad-1)" />
  <path class="anim-wave-2" d="M0,280 C200,220 500,320 800,240 C1000,180 1100,280 1200,300 L1200,400 L0,400 Z" fill="url(#wave-grad-2)" />

  <!-- Decorative Tech Line and Nodes -->
  <g opacity="0.5" transform="translate(100, 80)">
    <path d="M0,120 L250,120 L300,70 L700,70 L750,120 L1000,120" fill="none" stroke="url(#text-grad)" stroke-width="2" stroke-dasharray="8 4" />
    <circle cx="300" cy="70" r="4" fill="#a78bfa" filter="url(#glow)" />
    <circle cx="700" cy="70" r="4" fill="#60a5fa" filter="url(#glow)" />
  </g>

  <!-- Content (Floating Title & Subtitle) -->
  <g class="anim-float" transform="translate(600, 200)">
    <!-- Main Title -->
    <text text-anchor="middle" y="-20" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-weight="900" font-size="52" fill="url(#text-grad)" filter="url(#glow)" letter-spacing="2">
      AWESOME ePHARMACY BOYB
    </text>

    <!-- Subtitle -->
    <text text-anchor="middle" y="35" font-family="'Inter', system-ui, sans-serif" font-weight="600" font-size="20" fill="#94a3b8" letter-spacing="4">
      BRING YOUR OWN BRANDS ECOSYSTEM
    </text>

    <!-- Extra Badge Info -->
    <text text-anchor="middle" y="75" font-family="'Inter', system-ui, sans-serif" font-weight="500" font-size="14" fill="#64748b" letter-spacing="1">
      White-Label Platforms • SaaS Solutions • Open-Source GitHub Projects
    </text>
  </g>
</svg>
